name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-unit:
    name: typecheck + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  build:
    name: next build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: typecheck-and-unit

    env:
      # `instrumentation.ts` only enforces these in production. CI runs the
      # build in non-prod mode, but if these are unset Next.js may warn —
      # supply harmless dev values so the build path matches local.
      NEXTAUTH_SECRET: ci-not-a-real-secret
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build
        run: npm run build

  e2e:
    name: playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: typecheck-and-unit

    env:
      NEXTAUTH_SECRET: ci-not-a-real-secret
      NEXTAUTH_URL: http://localhost:3100
      ADMIN_EMAIL: admin@camobresidence.com
      ADMIN_PASSWORD: change-me

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
