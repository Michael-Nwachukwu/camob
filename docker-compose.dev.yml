# Local development database only — NOT for production.
# The app itself runs via `npm run dev` (hot reload); this just gives it a
# real Postgres to talk to so bookings, blackouts, etc. actually persist.
#
# Start:   docker compose -f docker-compose.dev.yml -p camob-dev up -d
# Stop:    docker compose -f docker-compose.dev.yml -p camob-dev down
# Wipe:    docker compose -f docker-compose.dev.yml -p camob-dev down -v
#
# Mapped to host port 5433 to avoid clashing with any existing Postgres on 5432.
# Matching DATABASE_URL: postgresql://camob:camob@localhost:5433/camob

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: camob
      POSTGRES_PASSWORD: camob
      POSTGRES_DB: camob
    ports:
      - "5433:5432"
    volumes:
      - dev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camob -d camob"]
      interval: 3s
      timeout: 3s
      retries: 15

volumes:
  dev-pgdata:
